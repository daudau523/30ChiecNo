<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hành trình 30 chiếc nơ - Gửi chị Thơm</title>
    <meta name="description" content="Món quà nhỏ cổ vũ tinh thần vượt qua mọi áp lực công việc.">
    <link rel="stylesheet" href="style.css">
    <!-- Font hỗ trợ tiếng Việt tốt nhất: Be Vietnam Pro cho UI, Lora cho nét thanh lịch -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div id="lenis-wrapper">
        <!-- Bầu trời đêm -->
        <div id="stars-container"></div>
        <div class="moon"></div>
        
        <!-- Bầu trời ngày -->
        <div class="day-background"></div>
        <div class="sun"></div>
        
        <header class="hero">
            <h1>Hành trình 30 chiếc nơ</h1>
            <p>Cuộn xuống để khám phá bộ sưu tập đầy màu sắc và những kỷ niệm rực rỡ nhất</p>
            <div class="scroll-indicator">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <polyline points="19 12 12 19 5 12"></polyline>
                </svg>
            </div>
        </header>

        <main id="bows-container">
            <!-- JavaScript sẽ tự động chèn các chiếc nơ vào đây -->
        </main>
        
        <footer class="footer">
            <div class="footer-content">
                <p>Và đây là kết thúc...</p>
                <p class="highlight">Hay chỉ là sự khởi đầu rực rỡ mới?</p>
            </div>
        </footer>
    </div>

    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    
    <!-- Lenis for Smooth Scroll -->
    <script src="https://unpkg.com/lenis@1.1.2/dist/lenis.min.js"></script>
    
    <!-- Custom Script -->
    <script src="app.js"></script>
</body>
</html>
